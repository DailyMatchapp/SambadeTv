    <style>
        :root {
            --bg: #0c0c0e;
            --accent: #6a8dff;
            --card: #151518;
            --text: #eee;
            --text-muted: #888;
            --border: #1a1a1d;
            --hover-bg: #22222a;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; /* يمنع التمرير الخارجي العشوائي على الكمبيوتر */
        }

        /* الحاوية الأساسية للصفحة لتنظيم الهيكل مع الفوتر */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh; /* فرض الارتفاع الكامل للشاشة */
            overflow: hidden;
        }

        /* تخطيط الصفحة الأساسي */
        .main-layout {
            display: flex;
            flex-direction: row-reverse; /* يجعل القنوات على اليمين والمشغل على اليسار */
            flex: 1;
            height: 100%;
            background: var(--bg);
            overflow: hidden; /* يمنع التمرير الخارجي للمشغل والقائمة على الكمبيوتر */
        }

        /* منطقة مشغل الفيديو */
        .player-section {
            flex: 3;
            height: 100%;
            background: #000;
            position: relative;
        }

        #artplayer-container {
            width: 100%;
            height: 100%;
        }

        /* كود مخصص لجعل الفيديو يملأ شاشة المشغل بالكامل */
        #artplayer-container video {
            object-fit: fill !important;
        }

        /* منطقة القنوات الجانبية */
        .sidebar-section {
            flex: 1;
            max-width: 360px;
            min-width: 300px;
            height: 100%;
            background: #111113;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* يمنع تمرير الحاوية بأكملها ويجبر قائمة القنوات على التمرير بشكل مستقل */
        }

        /* هيدر القائمة الجانبية (ثابت دائماً) */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            background: #111113;
            flex-shrink: 0; /* لمنع تقلص الحجم */
        }

        .sidebar-header h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* زر إعادة تشغيل البث */
        .btn-reload {
            background: rgba(106, 141, 255, 0.1);
            border: 1px solid rgba(106, 141, 255, 0.2);
            color: var(--accent);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s ease;
        }
        .btn-reload:hover {
            background: var(--accent);
            color: #000;
        }
        .btn-reload:active {
            transform: scale(0.9);
        }

        /* قسم التحكم وإضافة القنوات (ثابت دائماً) */
        .control-panel {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            background: #151518;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0; /* لمنع تقلص الحجم */
        }

        .btn-toggle-form {
            width: 100%;
            padding: 8px 12px;
            background: rgba(106, 141, 255, 0.08);
            border: 1px dashed rgba(106, 141, 255, 0.3);
            border-radius: 8px;
            color: var(--accent);
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-toggle-form:hover {
            background: rgba(106, 141, 255, 0.15);
            border-color: var(--accent);
        }

        /* نموذج إضافة وتعديل القناة */
        .add-channel-form {
            margin-top: 5px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #1c1c21;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        /* رأس نموذج الإضافة يحتوي على زر إغلاق X */
        .add-channel-form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .add-channel-form-header span {
            font-size: 13px;
            font-weight: bold;
            color: var(--accent);
        }
        .btn-close-form {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: color 0.2s;
        }
        .btn-close-form:hover {
            color: #ff4d4d;
        }

        .add-channel-form input {
            background: #111113;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 12px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }
        .add-channel-form input:focus {
            border-color: var(--accent);
        }
        .form-actions {
            display: flex;
            gap: 6px;
        }
        .btn-add-submit {
            flex: 2;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-cancel {
            flex: 1;
            background: #22222a;
            color: #ccc;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
        }

        /* الحاوية الكاملة للتمرير (تضم القنوات + الفوتر في الأسفل) */
        .sidebar-scrollable {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch; /* تمرير سلس للغاية لـ iOS/iPhone */
        }

        /* قائمة القنوات */
        .channel-list {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 20px; /* مسافة أمان سفلي تمنع اختفاء العناصر */
        }

        /* بطاقة القناة */
        .channel-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            overflow: hidden;
        }
        .channel-item:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }
        .channel-item.active {
            background: rgba(106, 141, 255, 0.1);
            border-color: var(--accent);
        }
        .channel-item img {
            width: 45px;
            height: 30px;
            object-fit: contain;
            border-radius: 4px;
            background: rgba(255,255,255,0.02);
        }
        .channel-item span {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            transition: padding-left 0.2s ease;
        }
        .channel-item:hover span {
            padding-left: 65px; /* يفسح مجالاً للأزرار لتفادي تغطية النص */
        }

        /* أزرار الإجراءات (تعديل ومسح) للقنوات المضافة */
        .channel-actions {
            display: none;
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            gap: 4px;
            z-index: 5;
        }
        .channel-item:hover .channel-actions {
            display: flex;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: #ccc;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .action-btn.edit-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .action-btn.delete-btn:hover {
            background: #ff4d4d;
            color: #fff;
            border-color: #ff4d4d;
        }

        /* فوتر احترافي */
        .main-footer {
            background: #09090b;
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: auto; /* يدفعه لأسفل القائمة دائماً في حال كانت القنوات قليلة */
            flex-shrink: 0;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footer-content strong {
            color: var(--accent);
        }
        .footer-links {
            display: flex;
            gap: 15px;
        }
        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: var(--accent);
        }

        /* دوران للهواتف عند تفعيل ملء الشاشة */
        @media (max-width: 1023px) {
            .player-container.landscape-mode {
                position: absolute; top: 50%; left: 50%;
                width: 100vh; height: 100vw;
                transform: translate(-50%, -50%) rotate(90deg);
                z-index: 99999;
            }
        }

        /* استجابة الشاشات الصغيرة وتفعيل التمرير الكامل للمتصفح لمنع قطع الفوتر */
        @media (max-width: 768px) {
            html, body {
                overflow-y: auto; /* تمكين التمرير الطبيعي لمتصفح الهاتف */
                height: auto;
            }
            .app-container {
                height: auto;
                overflow: visible;
            }
            .main-layout {
                flex-direction: column; /* المشغل بالأعلى والقنوات بالأسفل للهواتف */
                height: auto;
                overflow: visible;
            }
            .player-section {
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9; /* الحفاظ على نسبة عرض مثالية للمشغل */
                position: sticky; /* يظل المشغل معلقاً بالأعلى أثناء النزول لتصفح القنوات */
                top: 0;
                z-index: 1000;
                background: #000;
                flex: none;
            }
            .sidebar-section {
                width: 100%;
                max-width: none;
                min-width: none;
                height: auto;
                border-left: none;
                border-top: 1px solid var(--border);
                overflow: visible;
                display: flex;
                flex-direction: column;
            }
            .sidebar-scrollable {
                overflow-y: visible; /* تعطيل التمرير الداخلي والاعتماد على تمرير الصفحة الأساسي */
                height: auto;
            }
            .sidebar-header {
                padding: 12px 15px;
            }
            .control-panel {
                padding: 8px 15px;
            }
            .channel-item span {
                padding-left: 65px;
            }
            .channel-actions {
                display: flex;
                background: var(--card);
                padding-right: 5px;
            }
            .footer-content {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
        }

        /* تخصيص عنوان البث المباشر في وسط أعلى المشغل */
        .art-control-channel-title {
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            pointer-events: none;
            font-weight: bold;
            font-size: 14px !important;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            color: #fff !important;
            white-space: nowrap;
        }
    </style>
</head>

                    </button>

                    <div class="add-channel-form" id="addChannelForm" style="display: none;">

                        </div>
                    </div>
                </div>

                <!-- قسم التمرير الموحد للسايدبار (يضم القنوات والفوتر بالأسفل) -->
                <div class="sidebar-scrollable">
                    <div class="channel-list" id="channelListContainer">
                        <!-- يتم توليد القنوات برمجياً هنا -->
                    </div>
                    
                    <!-- فوتر الموقع المدمج في نهاية قائمة التمرير فقط -->
                    <footer class="main-footer">
                        <div class="footer-content">
                            <span>جميع الحقوق محفوظة © 2026 | <strong>SAMBADÈ TV</strong></span>
                            <span>بث حي ومباشر للمباريات والقنوات الرياضية</span>
                            <div class="footer-links">
                                <a href="#">الرئيسية</a>
                                <a href="#">جدول المباريات</a>
                                <a href="#">اتصل بنا</a>
                            </div>
                        </div>
                    </footer>
                </div>
            </div>

        </div>
    </div>

                logo: "https://i.ibb.co/B5x2b2wT/m62.png",
                sources: [
                    { label: "720p (HD)", url: "http://84.17.50.102/m6/index.m3u8" }
                ]
            }
        ];

        let myChannels = [];
        let art = null;
        let currentChIndex = 0;
        let currentSrcIndex = 0;
        let editingCustomIndex = null; // لمتابعة أي قناة نقوم بتعديلها حالياً
        const container = document.getElementById('playerContainer');

        // استدعاء وتحميل القنوات الافتراضية واليدوية المخزنة سابقاً
        function loadChannelsAndInit() {
            let customChannels = JSON.parse(localStorage.getItem('customChannels')) || [];
            
            // دمج القنوات الافتراضية مع قنوات المستخدم بعد تمييز قنوات المستخدم بـ isCustom
            myChannels = [
                ...defaultChannels,
                ...customChannels.map(c => ({ ...c, isCustom: true }))
            ];
            
            initChannelsUI();
        }

        // بناء وعرض قائمة القنوات الجانبية
        function initChannelsUI() {
            const listContainer = document.getElementById('channelListContainer');
            listContainer.innerHTML = "";

            myChannels.forEach((c, index) => {
                const activeClass = index === currentChIndex ? 'active' : '';
                
                // إضافة القناة مع توفير أزرار الإجراءات للقنوات المخصصة
                listContainer.innerHTML += `
                    <div class="channel-item ${activeClass}" id="ch-${index}" onclick="selectChannel(${index})">
                        <img src="${c.logo}" alt="${c.name}">
                        <span>${c.name}</span>
                        ${c.isCustom ? `
                            <div class="channel-actions">
                                <button class="action-btn edit-btn" onclick="editChannel(event, ${index})" title="تعديل القناة"><i class='bx bx-edit-alt'></i></button>
                                <button class="action-btn delete-btn" onclick="deleteChannel(event, ${index})" title="حذف القناة"><i class='bx bx-trash'></i></button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        }

        // اختيار وتشغيل القناة
        function selectChannel(index, srcIndex = 0) {
            if (index < 0 || index >= myChannels.length) return;

            const prevActive = document.querySelector('.channel-item.active');
            if (prevActive) prevActive.classList.remove('active');

            currentChIndex = index;
            currentSrcIndex = srcIndex;

            const currentItem = document.getElementById(`ch-${index}`);
            if (currentItem) currentItem.classList.add('active');

            const channel = myChannels[index];
            const source = channel.sources[srcIndex];

            if (art) {
                art.destroy(true);
                art = null;
            }

            const isM3u8 = source.url.includes('.m3u8') || source.url.includes('m3u8');

            art = new Artplayer({
                container: '#artplayer-container',
                url: source.url,
                type: isM3u8 ? 'm3u8' : '',
                customType: isM3u8 ? {
                    m3u8: function (video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls({
                                autoStartLoad: true,
                                capLevelToPlayerSize: false
                            });
                            hls.loadSource(url);
                            hls.attachMedia(video);
                            
                            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                                const levels = hls.levels;
                                if (levels && levels.length > 1) {
                                    const qualityControl = levels.map((level, index) => ({
                                        html: level.height ? `${level.height}p` : `جودة ${index + 1}`,
                                        value: index,
                                    }));
                                    
                                    qualityControl.unshift({ html: 'تلقائي (Auto)', value: -1 });
                                    
                                    art.controls.update({
                                        name: 'quality',
                                        index: 10,
                                        position: 'right',
                                        html: 'الجودة',
                                        selector: qualityControl,
                                        onSelect: function (item) {
                                            hls.currentLevel = item.value;
                                            return item.html;
                                        },
                                    });
                                }
                            });
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        }
                    },
                } : {},
                poster: 'https://i.ibb.co/HL22r5h7/Picsart-26-07-02-05-17-29-809.jpg',
                volume: 0.8,
                isLive: isM3u8,
                autoplay: true,
                pip: true,
                autoMini: false,  /* تم إيقاف الميزة لتجنب ظهور المشغل الدائري الصغير عند النزول لأسفل */
                setting: true,
                playbackRate: true,
                aspectRatio: true,
                fullscreen: true,
                theme: '#6a8dff', 
                lang: 'ar', 
                i18n: {
                    'ar': {
                        Play: 'تشغيل',
                        Pause: 'إيقاف مؤقت',
                        Volume: 'مستوى الصوت',
                        Mute: 'كتم الصوت',
                        Unmute: 'إلغاء الكتم',
                        Fullscreen: 'ملء الشاشة',
                        'Exit Fullscreen': 'خروج من ملء الشاشة',
                        Settings: 'الإعدادات',
                        'Play Speed': 'سرعة التشغيل',
                        Aspect: 'أبعاد العرض',
                        Flip: 'تدوير الشاشة',
                        Pip: 'صورة داخل صورة',
                    }
                },
                controls: [
                    {
                        name: 'channel-title',
                        position: 'top', 
                        html: `<span>${channel.name}</span>`,
                    }
                ],
            });

            if (channel.sources.length > 1) {
                const staticQualities = channel.sources.map((src, idx) => ({
                    html: src.label,
                    value: idx,
                }));

                art.controls.add({
                    name: 'static-quality',
                    index: 10,
                    position: 'right',
                    html: source.label,
                    selector: staticQualities,
                    onSelect: function (item) {
                        selectChannel(index, item.value);
                        return item.html;
                    },
                });
            }

            art.on('fullscreen', (state) => {
                if (state) {
                    if (window.innerWidth < 1024) {
                        container.classList.add('landscape-mode');
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock('landscape').catch(() => {});
                        }
                    }
                } else {
                    container.classList.remove('landscape-mode');
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                }
            });
        }

        // تفريغ الحقول واستعادة الحالة الأولى لنموذج التحكم
        function resetFormState() {
            document.getElementById('newChName').value = '';
            document.getElementById('newChUrl').value = '';
            document.getElementById('newChLogo').value = '';
            document.getElementById('formTitleText').innerText = "إضافة قناة جديدة";
            document.getElementById('btnSubmitForm').innerText = "إضافة";
            document.getElementById('toggleFormBtn').innerHTML = "<i class='bx bx-plus-circle'></i> إضافة قناة يدوياً";
            editingCustomIndex = null;
        }

        // تبديل عرض نموذج التحكم والقنوات مع إمكانية الإغلاق
        function toggleAddForm() {
            const form = document.getElementById('addChannelForm');
            const toggleBtn = document.getElementById('toggleFormBtn');
            if (form.style.display === 'none') {
                form.style.display = 'flex';
                toggleBtn.innerHTML = "<i class='bx bx-x-circle'></i> إغلاق نافذة الإضافة";
            } else {
                form.style.display = 'none';
                resetFormState();
            }
        }

        // إضافة وحفظ وتعديل بيانات القناة يدوياً
        function saveChannel() {
            const name = document.getElementById('newChName').value.trim();
            const url = document.getElementById('newChUrl').value.trim();
            let logo = document.getElementById('newChLogo').value.trim();

            if (!name || !url) {
                alert("يرجى تعبئة اسم القناة ورابط البث بالكامل.");
                return;
            }

            if (!logo) {
                logo = "https://i.ibb.co/HL22r5h7/Picsart-26-07-02-05-17-29-809.jpg"; 
            }

            let customChannels = JSON.parse(localStorage.getItem('customChannels')) || [];

            if (editingCustomIndex !== null) {
                // تعديل القناة الحالية
                customChannels[editingCustomIndex] = {
                    name: name,
                    logo: logo,
                    sources: [{ label: "تلقائي (Auto)", url: url }]
                };
                localStorage.setItem('customChannels', JSON.stringify(customChannels));
                
                loadChannelsAndInit();
                
                const actualIndex = defaultChannels.length + editingCustomIndex;
                selectChannel(actualIndex);
                alert("تم تعديل القناة وحفظ التغييرات بنجاح.");
            } else {
                // إضافة القناة الجديدة للمصفوفة والذاكرة
                const newChannel = {
                    name: name,
                    logo: logo,
                    sources: [{ label: "تلقائي (Auto)", url: url }]
                };
                customChannels.push(newChannel);
                localStorage.setItem('customChannels', JSON.stringify(customChannels));
                
                loadChannelsAndInit();
                selectChannel(myChannels.length - 1);
            }

            toggleAddForm(); // إخفاء وإفراغ النموذج
        }

        // تجهيز بيانات القناة للتعديل وفتح النموذج تلقائياً
        function editChannel(event, index) {
            event.stopPropagation(); // منع استدعاء تشغيل القناة عند النقر على أيقونة التعديل
            
            const customIndex = index - defaultChannels.length;
            if (customIndex < 0) return;

            let customChannels = JSON.parse(localStorage.getItem('customChannels')) || [];
            const channel = customChannels[customIndex];

            // تعبئة البيانات في حقول الإدخال
            document.getElementById('newChName').value = channel.name;
            document.getElementById('newChUrl').value = channel.sources[0].url;
            document.getElementById('newChLogo').value = channel.logo === "https://i.ibb.co/HL22r5h7/Picsart-26-07-02-05-17-29-809.jpg" ? "" : channel.logo;

            // تغيير النصوص بالنموذج
            document.getElementById('formTitleText').innerText = "تعديل بيانات القناة";
            document.getElementById('btnSubmitForm').innerText = "حفظ التعديلات";
            document.getElementById('toggleFormBtn').innerHTML = "<i class='bx bx-x-circle'></i> إلغاء التعديل والإغلاق";

            // فتح النموذج تلقائياً
            document.getElementById('addChannelForm').style.display = 'flex';
            editingCustomIndex = customIndex;
        }

        // حذف القناة تمامًا من الذاكرة المحلية
        function deleteChannel(event, index) {
            event.stopPropagation(); // منع تشغيل القناة عند محاولة الحذف

            if (!confirm("هل أنت متأكد من رغبتك في حذف هذه القناة المضافة بشكل نهائي؟")) return;

            const customIndex = index - defaultChannels.length;
            if (customIndex < 0) return;

            let customChannels = JSON.parse(localStorage.getItem('customChannels')) || [];
            customChannels.splice(customIndex, 1);
            localStorage.setItem('customChannels', JSON.stringify(customChannels));

            const wasActive = (currentChIndex === index);
            loadChannelsAndInit();

            // العودة لتشغيل قناة آمنة في حال تم حذف القناة الجاري عرضها
            if (wasActive) {
                selectChannel(0, 0);
            } else if (currentChIndex > index) {
                selectChannel(currentChIndex - 1, currentSrcIndex);
            } else {
                selectChannel(currentChIndex, currentSrcIndex);
            }
        }

        // دالة تحديث البث الحالي فورياً
        function reloadStream() {
            const reloadIcon = document.querySelector('#reloadBtn i');
            if (reloadIcon) {
                reloadIcon.classList.add('bx-spin');
            }

            selectChannel(currentChIndex, currentSrcIndex);

            setTimeout(() => {
                if (reloadIcon) reloadIcon.classList.remove('bx-spin');
            }, 800);
        }

        // بدء تشغيل الصفحة وجلب أول قناة تلقائياً عند التحميل
        function initPage() {
            loadChannelsAndInit();
            selectChannel(0, 0); 
        }

        window.onload = initPage;
    </script>
</body>
</html>

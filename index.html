<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAMBADE | TV Dashboard</title>
     <link rel="icon" type="image/png" href="https://i.ibb.co/Y4kPH1MD/television-icon-27.png" />

    <style>
        :root {
            --xbox-green: #eee;
            --xbox-dark: #050a05;
            --xbox-panel: rgba(10, 20, 10, 0.95);
            --glow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background-color: #000;
            color: var(--xbox-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- BACKGROUND --- */
        .bg-orb {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #0f350f 0%, #000000 80%);
            z-index: -2;
            animation: pulse 8s infinite alternate;
        }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.2;
        }
        @keyframes pulse { 0% { opacity: 0.8; } 100% { opacity: 1; } }

        /* --- TV SPLIT CONTAINER --- */
        #app {
            display: flex;
            flex-direction: row; /* توزيع أفقي مخصص للشاشات الكبيرة والتلفزيون */
            height: 100vh;
            width: 100vw;
            z-index: 10;
            overflow: hidden;
        }

        /* العمود الأيسر: مشغل الفيديو بالكامل */
        #left-pane {
            flex: 7; /* يستحوذ على 70% من مساحة الشاشة */
            display: flex;
            flex-direction: column;
            background: #000;
            border-right: 2px solid rgba(57, 255, 20, 0.3);
            height: 100%;
        }

        /* العمود الأيمن: قائمة القنوات والبحث والتبويبات */
        #right-pane {
            flex: 3; /* يستحوذ على 30% من مساحة الشاشة */
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.85);
            height: 100%;
            overflow: hidden;
        }

        /* تنسيقات المشغل */
        #player-section {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .player-wrapper {
            flex: 1;
            width: 100%;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: fill; /* الحفاظ على نسبة العرض الأصلية 16:9 على التلفاز */
        }

        .player-placeholder {
            position: absolute; color: var(--xbox-green);
            text-align: center; pointer-events: none;
        }

        .player-controls {
            padding: 15px 20px;
            background: var(--xbox-panel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(57, 255, 20, 0.2);
        }

        #info-title {
            font-size: 1.3rem; /* تكبير الخط للتلفزيون */
            font-family: 'Orbitron', sans-serif;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: #fff;
        }

        #connection-status {
            color: #666; 
            font-size: 0.9rem; 
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* تنسيقات الترويسة والبحث */
        header {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(57, 255, 20, 0.3);
            gap: 15px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin: 0;
            display: flex; align-items: center; gap: 10px;
            color: #fff;
        }
        .logo-x {
            width: 24px; height: 24px;
            border: 2px solid var(--xbox-green);
            border-radius: 50%; position: relative;
        }
        .logo-x::before, .logo-x::after {
            content: ''; position: absolute; background: var(--xbox-green);
            top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(45deg);
        }
        .logo-x::before { width: 70%; height: 2px; } .logo-x::after { height: 70%; width: 2px; }

        .search-container { width: 100%; display: flex; }
        #search-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: var(--xbox-green);
            padding: 12px 15px;
            font-family: 'Share Tech Mono';
            font-size: 1.1rem; /* تكبير حقل البحث ليكون واضحاً عن بُعد */
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        #search-input:focus {
            border-color: var(--xbox-green);
            box-shadow: var(--glow);
        }

        /* تنسيقات قائمة القنوات والتبويبات */
        #list-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .list-tabs { display: flex; background: #000; }
        .tab-btn {
            flex: 1; padding: 15px;
            background: transparent; color: #666;
            border: none; border-bottom: 2px solid transparent;
            font-family: 'Orbitron'; font-size: 0.9rem;
            cursor: pointer; letter-spacing: 1px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--xbox-green); border-bottom-color: var(--xbox-green);
            background: rgba(57, 255, 20, 0.1);
        }

        #channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 0; margin: 0; list-style: none;
        }

        /* تحسين مسافات وحجم عناصر القنوات لتناسب المشاهدة من مسافة البعيدة */
        .channel-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .channel-item:hover { 
            background: rgba(57, 255, 20, 0.1); 
        }
        .channel-item.active {
            background: rgba(57, 255, 20, 0.2);
            border-left: 4px solid var(--xbox-green);
        }
        .channel-logo {
            width: 44px; height: 44px; object-fit: contain;
            background: #111; border-radius: 6px; flex-shrink: 0;
        }
        .channel-info div:first-child { font-weight: bold; font-size: 1.1rem; margin-bottom: 4px; }
        .channel-info div:last-child { font-size: 0.8rem; color: #888; }

        .load-more {
            width: 100%; padding: 20px; background: transparent;
            color: var(--xbox-green); border: none; font-family: 'Share Tech Mono';
            font-size: 1rem; cursor: pointer;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 60px; height: 60px; border: 5px solid #111;
            border-top: 5px solid var(--xbox-green); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

        window.onload = fetchChannels;

        async function fetchChannels() {
            try {
                const res = await fetch(M3U_URL);
                if (!res.ok) throw new Error("Failed");
                const text = await res.text();
                
                const lines = text.split('\n');
                let currentCh = {};
                
                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        const info = line.substring(8);
                        const parts = info.split(',');
                        currentCh = {
                            name: parts[parts.length - 1].trim(),
                            logo: (line.match(/tvg-logo="([^"]*)"/) || [])[1],
                            group: (line.match(/group-title="([^"]*)"/) || [])[1] || 'Uncategorized',
                            lang: (line.match(/tvg-language="([^"]*)"/) || [])[1] || '',
                            country: (line.match(/tvg-country="([^"]*)"/) || [])[1] || ''
                        };
                    } else if (line.startsWith('https://')) {
                        if (currentCh.name) {
                            currentCh.url = line;
                            allChannels.push(currentCh);
                        }
                        currentCh = {};
                    }
                }
                filteredChannels = allChannels;
                renderList();
                loadingOverlay.style.display = 'none';

                // تشغيل تلقائي لأول قناة مقترحة
                setTimeout(() => {
                    const suggestions = allChannels.filter(c => SUGGESTED_SET.has(c.name));
                    const play = suggestions.length ? suggestions[0] : allChannels[0];
                    if(play) loadChannel(play.url, play.name);
                }, 1000);

            } catch (e) {
                document.querySelector('.spinner').style.borderColor = 'red';
                document.querySelector('.spinner').nextElementSibling.textContent = "SYSTEM ERROR";
            }
        }

        window.loadChannel = function(url, name) {
            if(connectionTimeout) clearTimeout(connectionTimeout);
            
            document.getElementById('info-title').textContent = name;
            document.getElementById('connection-status').textContent = "CONNECTING...";
            document.getElementById('connection-status').style.color = "yellow";

            if (hls) { hls.destroy(); hls = null; }

            connectionTimeout = setTimeout(() => {
                document.getElementById('connection-status').textContent = "TIMEOUT";
                document.getElementById('connection-status').style.color = "red";
            }, 15000);

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    clearTimeout(connectionTimeout);
                    video.play().catch(() => {});
                });
                hls.on(Hls.Events.ERROR, (e,d) => { if(d.fatal) hls.destroy(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    clearTimeout(connectionTimeout);
                    video.play();
                });
            }

            video.onplaying = () => {
                clearTimeout(connectionTimeout);
                document.getElementById('connection-status').textContent = "LIVE";
                document.getElementById('connection-status').style.color = "#39ff14";
            };
        };

            const group = c.group ? c.group.toLowerCase() : '';
            
            const sportsKeywords = ['sport', 'sports', 'football', 'soccer', 'espn', 'arena', 'fc', 'golf', 'racing', 'fight', 'wwe', 'ufc', 'athletics'];
            const isSport = sportsKeywords.some(keyword => name.includes(keyword) || group.includes(keyword));
            
            const isEnglish = c.lang === 'eng' || c.lang === 'en' || c.country === 'US' || c.country === 'GB' || c.country === 'CA' || 
                              (!c.lang && !name.match(/[\u0600-\u06FF]/) && !name.includes('español') && !name.includes('latino'));
                              
            return isSport && isEnglish;
        }

        window.applyFilter = function(mode) {
            currentFilterMode = mode;
            visibleLimit = PAGE_SIZE;
            document.getElementById('btn-all').className = mode === 'all' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('btn-suggestions').className = mode === 'suggestions' ? 'tab-btn active' : 'tab-btn';

            if (mode === 'all') {
                filteredChannels = allChannels;
            } else if (mode === 'suggestions') {
                let suggestions = allChannels.filter(c => SUGGESTED_SET.has(c.name));
                
                // الترتيب لإبراز الرياضة الإنجليزية في البداية أولاً
                suggestions.sort((a, b) => {
                    const aIsSport = isEnglishSports(a);
                    const bIsSport = isEnglishSports(b);
                    
                    if (aIsSport && !bIsSport) return -1;
                    if (!aIsSport && bIsSport) return 1;
                    return a.name.localeCompare(b.name);
                });
                
                filteredChannels = suggestions;
            }
            renderList();
        };

        function renderList() {
            channelListEl.innerHTML = '';
            document.getElementById('channel-count').textContent = filteredChannels.length;
            
            const subset = filteredChannels.slice(0, visibleLimit);
            if(!subset.length) { channelListEl.innerHTML = '<li style="padding:20px;text-align:center;">NO CHANNELS FOUND</li>'; return; }

            const frag = document.createDocumentFragment();
            subset.forEach(c => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.innerHTML = `<img src="${c.logo || ''}" class="channel-logo" onerror="this.style.display='none'"><div class="channel-info"><div>${c.name}</div><div>${c.group}</div></div>`;
                li.onclick = () => {
                    document.querySelectorAll('.channel-item').forEach(e => e.classList.remove('active'));
                    li.classList.add('active');
                    loadChannel(c.url, c.name);
                };
                frag.appendChild(li);
            });
            channelListEl.appendChild(frag);
            
            if(filteredChannels.length > visibleLimit) {
                const btn = document.createElement('button');
                btn.className = 'load-more';
                btn.textContent = "LOAD MORE";
                btn.onclick = () => { visibleLimit += PAGE_SIZE; renderList(); };
                channelListEl.appendChild(btn);
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            visibleLimit = PAGE_SIZE;
            if(!val) return applyFilter(currentFilterMode);
            
            const source = currentFilterMode === 'suggestions' ? allChannels.filter(c => SUGGESTED_SET.has(c.name)) : allChannels;
            
            filteredChannels = source.filter(c => c.name.toLowerCase().includes(val) || c.group.toLowerCase().includes(val));
            renderList();
        });
    </script>
</body>
</html>
